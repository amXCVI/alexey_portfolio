name: Deploy to GitHub Pages

on:
  # Deploy on every push to main…
  push:
    branches: [main]
  # …and allow manual runs.
  workflow_dispatch:

# Permissions required by the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Detects the correct origin + base path for this repo
      # (handles both project pages — /<repo> — and user/org root pages — /).
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build Astro site
        uses: withastro/action@v3
        env:
          SITE_URL: ${{ steps.pages.outputs.origin }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
